name: cd

on:
  push:
    branches: [main]

jobs:

  deploy:
    jobs: Deploy
    runs-on: ubuntu:latests

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Build
        uses: ./scripts/buildprod.sh

